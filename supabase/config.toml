# Supabase local config for Nexis. Run `supabase start` to boot the local stack.
project_id = "nexis"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "nexis://auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true

# Enable later with real credentials (Stage 1 optional):
# [auth.external.google]
# enabled = true
# client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
# secret = "env(GOOGLE_OAUTH_SECRET)"

[edge_runtime]
enabled = true

[analytics]
enabled = false


